version: '3.8'

services:
  app:
    image: python:3.12-slim
    container_name: ${CONTAINER_NAME:-stack-test-app}
    working_dir: /app
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=8000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=testdb
      - DB_USER=testuser
      - DB_PASSWORD=testpass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    command: bash -c "pip install -e . && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./mock-app:/app:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: ${CONTAINER_NAME_POSTGRES:-stack-test-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_DB=testdb
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpass
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ${CONTAINER_NAME_REDIS:-stack-test-redis}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  redis-data:
